name: ci
on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: required docs present
        run: |
          # Kept in sync with files that exist. #20 purged AJL inventory docs and
          # VERSION moved off 0.0.1-dev; this job was never updated (permanent red).
          # VERSION checked for semver shape so a release bump cannot re-break this.
          test -f README.md
          test -f LICENSE
          test -f docs/VISION.md
          test -f docs/WORKFLOW.md
          test -f docs/ARCHITECTURE.md
          test -f docs/DECISIONS.md
          test -f docs/EPICS.md
          test -f docs/INTEGRATIONS.md
          test -f .cz.toml
          test -f VERSION
          grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' VERSION \
            || { echo "VERSION is not semver-shaped: $(cat VERSION)" >&2; exit 1; }

  python:
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: sync, lint, test, CLI
        run: |
          uv python install 3.14
          uv sync
          uv run ruff check .
          uv run pytest
          uv run agent-harness version
          uv run agent-harness spawn --issue 3 --dry-run
